<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#fdf4ff"/>
  <!-- stem -->
  <line x1="50" y1="85" x2="50" y2="50" stroke="#6b7280" stroke-width="2.5" stroke-linecap="round"/>
  <!-- leaves -->
  <ellipse cx="36" cy="65" rx="12" ry="5" fill="#86efac" transform="rotate(-25 36 65)"/>
  <ellipse cx="64" cy="65" rx="12" ry="5" fill="#86efac" transform="rotate(25 64 65)"/>
  <!-- flower petals -->
  <ellipse cx="50" cy="30" rx="8" ry="18" fill="#f9a8d4" opacity="0.7"/>
  <ellipse cx="50" cy="30" rx="8" ry="18" fill="#f9a8d4" opacity="0.7" transform="rotate(45 50 30)"/>
  <ellipse cx="50" cy="30" rx="8" ry="18" fill="#f9a8d4" opacity="0.7" transform="rotate(90 50 30)"/>
  <ellipse cx="50" cy="30" rx="8" ry="18" fill="#f9a8d4" opacity="0.7" transform="rotate(135 50 30)"/>
  <!-- center -->
  <circle cx="50" cy="30" r="7" fill="#fde68a"/>
  <circle cx="50" cy="30" r="4" fill="#fbbf24"/>
  <text x="50" y="97" text-anchor="middle" font-size="8" fill="#be185d" font-family="sans-serif">Jasmine</text>
</svg>
