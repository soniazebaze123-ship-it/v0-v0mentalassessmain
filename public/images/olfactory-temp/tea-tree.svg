<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="16" fill="#ecfdf5"/>
  <!-- trunk -->
  <rect x="44" y="60" width="12" height="28" rx="4" fill="#92400e"/>
  <!-- canopy layers -->
  <ellipse cx="50" cy="55" rx="28" ry="18" fill="#22c55e"/>
  <ellipse cx="50" cy="42" rx="22" ry="16" fill="#16a34a"/>
  <ellipse cx="50" cy="30" rx="16" ry="13" fill="#15803d"/>
  <!-- small white flowers (tea tree blooms) -->
  <circle cx="42" cy="38" r="3" fill="white" opacity="0.9"/>
  <circle cx="58" cy="35" r="3" fill="white" opacity="0.9"/>
  <circle cx="50" cy="26" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="36" cy="50" r="2.5" fill="white" opacity="0.9"/>
  <circle cx="64" cy="48" r="2.5" fill="white" opacity="0.9"/>
  <!-- center dots -->
  <circle cx="42" cy="38" r="1" fill="#fbbf24"/>
  <circle cx="58" cy="35" r="1" fill="#fbbf24"/>
  <circle cx="50" cy="26" r="1" fill="#fbbf24"/>
  <text x="50" y="97" text-anchor="middle" font-size="7.5" fill="#166534" font-family="sans-serif">Tea Tree</text>
</svg>
